<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="liverGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8590c"/>
      <stop offset="100%" stop-color="#b03106"/>
    </radialGradient>
    <radialGradient id="stomachGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff922b"/>
      <stop offset="100%" stop-color="#e67700"/>
    </radialGradient>
    <radialGradient id="smallIntestineGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc078"/>
      <stop offset="100%" stop-color="#f59f00"/>
    </radialGradient>
    <linearGradient id="largeIntestineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94d82d"/>
      <stop offset="100%" stop-color="#5c940d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" rx="20"/>
  <text x="50" y="50" font-family="monospace" font-size="20" fill="#666">The Digestive System</text>

  <g id="mouth_esophagus">
    <!-- Mouth and Pharynx -->
    <path d="M 400 50 Q 420 50 420 80 Q 420 100 400 120" fill="none" stroke="#ffa8a8" stroke-width="20" stroke-linecap="round"/>
    <text x="440" y="80" font-family="sans-serif" font-size="14" fill="#666" font-weight="bold">Mouth</text>
    
    <!-- Esophagus -->
    <path d="M 400 120 L 400 250" fill="none" stroke="#ff8787" stroke-width="16"/>
    <text x="420" y="180" font-family="sans-serif" font-size="14" fill="#666" font-weight="bold">Esophagus</text>
  </g>

  <g id="liver_gallbladder">
    <!-- Liver -->
    <path d="M 400 230 C 500 230, 520 280, 500 320 C 450 340, 350 300, 320 280 C 300 260, 320 230, 400 230 Z" fill="url(#liverGrad)" stroke="#852100" stroke-width="3"/>
    <text x="450" y="270" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Liver</text>
    
    <!-- Gallbladder -->
    <ellipse cx="430" cy="320" rx="15" ry="10" fill="#40c057" stroke="#2b8a3e" stroke-width="2" transform="rotate(-20 430 320)"/>
  </g>

  <g id="stomach">
    <!-- Stomach -->
    <path d="M 400 250 C 350 250, 300 300, 320 350 C 340 400, 420 350, 420 320 C 420 280, 430 260, 400 250 Z" fill="url(#stomachGrad)" stroke="#c76500" stroke-width="3"/>
    <text x="320" y="320" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Stomach</text>
  </g>

  <g id="pancreas">
    <!-- Pancreas (behind stomach, peeking out) -->
    <path d="M 370 340 Q 420 340 450 320 Q 480 340 450 360 Q 400 360 370 340 Z" fill="#ffd43b" stroke="#e67700" stroke-width="2"/>
    <text x="440" y="360" font-family="sans-serif" font-size="12" fill="#d9480f" font-weight="bold">Pancreas</text>
  </g>

  <g id="small_intestine">
    <!-- Squiggly small intestine -->
    <path d="M 380 350 C 350 380, 450 380, 420 410 C 380 440, 480 440, 450 470 C 420 500, 350 480, 350 450" fill="none" stroke="url(#smallIntestineGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="400" y="420" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="middle">Small Intestine</text>
  </g>

  <g id="large_intestine">
    <!-- Large Intestine framing the small intestine -->
    <path d="M 350 450 L 320 450 L 320 370 L 480 370 L 480 480 L 420 480" fill="none" stroke="url(#largeIntestineGrad)" stroke-width="30" stroke-linejoin="round"/>
    <!-- Rectum -->
    <path d="M 420 480 L 420 520" fill="none" stroke="url(#largeIntestineGrad)" stroke-width="20" stroke-linecap="round"/>
    
    <text x="320" y="410" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold" text-anchor="end">Large Intestine</text>
  </g>

</svg>
