<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="dnaStrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1c7ed6"/>
      <stop offset="100%" stop-color="#74c0fc"/>
    </linearGradient>
    <linearGradient id="newStrand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f03e3e"/>
      <stop offset="100%" stop-color="#ffa8a8"/>
    </linearGradient>
    <radialGradient id="helicaseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd43b"/>
      <stop offset="100%" stop-color="#f59f00"/>
    </radialGradient>
    <linearGradient id="polymeraseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c057"/>
      <stop offset="100%" stop-color="#2b8a3e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#212529" rx="20"/>
  <text x="50" y="50" font-family="monospace" font-size="20" fill="#dee2e6">DNA Replication</text>

  <g id="parental_dna">
    <!-- Unzipping double helix on the left -->
    <path d="M 50 300 Q 150 200 250 300 T 400 300" stroke="url(#dnaStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 50 300 Q 150 400 250 300 T 400 300" stroke="url(#dnaStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Base pairs -->
    <line x1="80" y1="275" x2="80" y2="325" stroke="#fff" stroke-width="3"/>
    <line x1="120" y1="240" x2="120" y2="360" stroke="#fff" stroke-width="3"/>
    <line x1="160" y1="220" x2="160" y2="380" stroke="#fff" stroke-width="3"/>
    <line x1="200" y1="240" x2="200" y2="360" stroke="#fff" stroke-width="3"/>
    <line x1="240" y1="275" x2="240" y2="325" stroke="#fff" stroke-width="3"/>
  </g>

  <g id="replication_fork">
    <!-- Unzipped top strand -->
    <path d="M 400 300 C 450 300, 500 150, 750 150" stroke="url(#dnaStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Unzipped bottom strand -->
    <path d="M 400 300 C 450 300, 500 450, 750 450" stroke="url(#dnaStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <text x="350" y="270" font-family="sans-serif" font-size="14" fill="#868e96">Replication Fork</text>
  </g>

  <g id="helicase">
    <polygon points="360,280 430,300 360,320" fill="url(#helicaseGrad)" stroke="#e67700" stroke-width="2"/>
    <text x="365" y="305" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Helicase</text>
  </g>

  <g id="leading_strand">
    <!-- New continuous strand -->
    <path d="M 750 170 C 500 170, 480 290, 430 290" stroke="url(#newStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Base pairs bonding -->
    <line x1="700" y1="150" x2="700" y2="170" stroke="#fff" stroke-width="3"/>
    <line x1="650" y1="150" x2="650" y2="170" stroke="#fff" stroke-width="3"/>
    <line x1="600" y1="150" x2="600" y2="170" stroke="#fff" stroke-width="3"/>
    <line x1="550" y1="160" x2="550" y2="180" stroke="#fff" stroke-width="3"/>
    <line x1="500" y1="210" x2="500" y2="230" stroke="#fff" stroke-width="3"/>
  </g>

  <g id="lagging_strand">
    <!-- Okazaki fragments -->
    <path d="M 750 430 C 700 430, 680 430, 650 430" stroke="url(#newStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 620 430 C 580 430, 560 410, 520 410" stroke="url(#newStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 490 390 C 470 370, 460 350, 440 330" stroke="url(#newStrand)" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Base pairs bonding -->
    <line x1="700" y1="450" x2="700" y2="430" stroke="#fff" stroke-width="3"/>
    <line x1="600" y1="440" x2="600" y2="420" stroke="#fff" stroke-width="3"/>
    <line x1="480" y1="390" x2="480" y2="370" stroke="#fff" stroke-width="3"/>
  </g>

  <g id="dna_polymerase">
    <ellipse cx="450" cy="285" rx="30" ry="20" fill="url(#polymeraseGrad)" stroke="#1864ab" stroke-width="2"/>
    <text x="430" y="290" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Pol III</text>
    
    <ellipse cx="580" cy="420" rx="30" ry="20" fill="url(#polymeraseGrad)" stroke="#1864ab" stroke-width="2"/>
    <text x="560" y="425" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff">Pol III</text>
  </g>

</svg>
