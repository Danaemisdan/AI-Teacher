<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="cellBg" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="70%" stop-color="#ffe3e3"/>
      <stop offset="100%" stop-color="#ffcaca"/>
    </radialGradient>
    
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e2baff"/>
      <stop offset="80%" stop-color="#b15dff"/>
      <stop offset="100%" stop-color="#7e13e8"/>
    </radialGradient>
    
    <linearGradient id="mitochondriaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7b00"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" rx="20"/>

  <g id="cell_membrane">
    <circle cx="400" cy="300" r="260" fill="url(#cellBg)" stroke="#ff758c" stroke-width="8"/>
    <text x="100" y="50" font-family="monospace" font-size="20" fill="#666">Animal Cell Structure</text>
  </g>

  <g id="cytoplasm">
    <!-- Just logical grouping for lesson highlights -->
    <circle cx="400" cy="300" r="250" fill="transparent"/>
  </g>

  <g id="nucleus">
    <circle cx="400" cy="300" r="80" fill="url(#nucleusGrad)" stroke="#52009e" stroke-width="4"/>
    <circle cx="420" cy="280" r="25" fill="#52009e"/> <!-- nucleolus -->
    <path d="M 350 280 Q 370 250 400 250" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <g id="mitochondria">
    <!-- Mitochondrion 1 -->
    <g transform="translate(250, 200) rotate(45)">
      <ellipse cx="0" cy="0" rx="40" ry="20" fill="url(#mitochondriaGrad)" stroke="#c25e00" stroke-width="3"/>
      <path d="M -30 0 Q -15 -15 0 0 T 30 0" stroke="#fff" stroke-width="2" fill="none"/>
    </g>
    <!-- Mitochondrion 2 -->
    <g transform="translate(550, 400) rotate(-30)">
      <ellipse cx="0" cy="0" rx="40" ry="20" fill="url(#mitochondriaGrad)" stroke="#c25e00" stroke-width="3"/>
      <path d="M -30 0 Q -15 -15 0 0 T 30 0" stroke="#fff" stroke-width="2" fill="none"/>
    </g>
    <!-- Mitochondrion 3 -->
    <g transform="translate(280, 420) rotate(15)">
      <ellipse cx="0" cy="0" rx="35" ry="18" fill="url(#mitochondriaGrad)" stroke="#c25e00" stroke-width="3"/>
      <path d="M -25 0 Q -10 -10 0 0 T 25 0" stroke="#fff" stroke-width="2" fill="none"/>
    </g>
  </g>

  <g id="endoplasmic_reticulum">
    <!-- Rough ER around nucleus -->
    <path d="M 310 250 Q 280 300 310 350 Q 330 380 360 385" stroke="#4dabf7" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 490 250 Q 520 300 490 350 Q 470 380 440 385" stroke="#4dabf7" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 330 220 Q 400 190 470 220" stroke="#4dabf7" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>

  <g id="ribosomes">
    <!-- Dots on rough ER and in cytoplasm -->
    <circle cx="310" cy="280" r="3" fill="#228be6"/>
    <circle cx="305" cy="310" r="3" fill="#228be6"/>
    <circle cx="320" cy="340" r="3" fill="#228be6"/>
    <circle cx="490" cy="280" r="3" fill="#228be6"/>
    <circle cx="495" cy="310" r="3" fill="#228be6"/>
    <circle cx="480" cy="340" r="3" fill="#228be6"/>
    <circle cx="400" cy="210" r="3" fill="#228be6"/>
    <circle cx="370" cy="215" r="3" fill="#228be6"/>
    
    <!-- Free ribosomes -->
    <circle cx="200" cy="300" r="3" fill="#228be6"/>
    <circle cx="220" cy="350" r="3" fill="#228be6"/>
    <circle cx="580" cy="280" r="3" fill="#228be6"/>
    <circle cx="560" cy="220" r="3" fill="#228be6"/>
    <circle cx="450" cy="450" r="3" fill="#228be6"/>
  </g>

  <g id="golgi_apparatus">
    <g transform="translate(500, 180) rotate(-20)">
      <path d="M -40 -15 Q 0 -30 40 -15" stroke="#20c997" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M -50 0 Q 0 -20 50 0" stroke="#20c997" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M -30 15 Q 0 -5 30 15" stroke="#20c997" stroke-width="8" fill="none" stroke-linecap="round"/>
      <circle cx="-60" cy="5" r="6" fill="#20c997"/>
      <circle cx="55" cy="-10" r="5" fill="#20c997"/>
    </g>
  </g>

  <g id="lysosomes">
    <circle cx="350" cy="150" r="15" fill="#fa5252" opacity="0.8"/>
    <circle cx="250" cy="480" r="18" fill="#fa5252" opacity="0.8"/>
    <circle cx="600" cy="350" r="12" fill="#fa5252" opacity="0.8"/>
  </g>

</svg>
