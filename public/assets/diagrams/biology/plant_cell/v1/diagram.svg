<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="cellWall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40c057"/>
      <stop offset="100%" stop-color="#2b8a3e"/>
    </linearGradient>

    <radialGradient id="cytoplasm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdfaed"/>
      <stop offset="100%" stop-color="#d8f5a2"/>
    </radialGradient>
    
    <linearGradient id="vacuole" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7f5ff"/>
      <stop offset="100%" stop-color="#a5d8ff"/>
    </linearGradient>

    <linearGradient id="chloroplast" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ce99a"/>
      <stop offset="100%" stop-color="#2f9e44"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f8f9fa" rx="20"/>

  <g id="cell_wall">
    <rect x="150" y="50" width="500" height="500" rx="30" fill="url(#cellWall)" stroke="#2b8a3e" stroke-width="8"/>
    <text x="50" y="50" font-family="monospace" font-size="20" fill="#666">Plant Cell Structure</text>
  </g>

  <g id="cell_membrane">
    <rect x="165" y="65" width="470" height="470" rx="20" fill="url(#cytoplasm)" stroke="#ffe066" stroke-width="4"/>
  </g>

  <g id="central_vacuole">
    <rect x="250" y="150" width="300" height="250" rx="40" fill="url(#vacuole)" stroke="#74c0fc" stroke-width="3" opacity="0.9"/>
  </g>

  <g id="chloroplasts">
    <g transform="translate(200, 120)">
      <ellipse cx="0" cy="0" rx="35" ry="15" fill="url(#chloroplast)" stroke="#2f9e44" stroke-width="2"/>
      <circle cx="-15" cy="0" r="5" fill="#12b886"/>
      <circle cx="0" cy="0" r="5" fill="#12b886"/>
      <circle cx="15" cy="0" r="5" fill="#12b886"/>
    </g>
    <g transform="translate(600, 200) rotate(45)">
      <ellipse cx="0" cy="0" rx="35" ry="15" fill="url(#chloroplast)" stroke="#2f9e44" stroke-width="2"/>
      <circle cx="-15" cy="0" r="5" fill="#12b886"/>
      <circle cx="0" cy="0" r="5" fill="#12b886"/>
      <circle cx="15" cy="0" r="5" fill="#12b886"/>
    </g>
    <g transform="translate(220, 420) rotate(-30)">
      <ellipse cx="0" cy="0" rx="35" ry="15" fill="url(#chloroplast)" stroke="#2f9e44" stroke-width="2"/>
      <circle cx="-15" cy="0" r="5" fill="#12b886"/>
      <circle cx="0" cy="0" r="5" fill="#12b886"/>
      <circle cx="15" cy="0" r="5" fill="#12b886"/>
    </g>
    <g transform="translate(580, 480) rotate(15)">
      <ellipse cx="0" cy="0" rx="35" ry="15" fill="url(#chloroplast)" stroke="#2f9e44" stroke-width="2"/>
      <circle cx="-15" cy="0" r="5" fill="#12b886"/>
      <circle cx="0" cy="0" r="5" fill="#12b886"/>
      <circle cx="15" cy="0" r="5" fill="#12b886"/>
    </g>
  </g>

  <g id="nucleus">
    <circle cx="400" cy="450" r="60" fill="#e2baff" stroke="#52009e" stroke-width="3"/>
    <circle cx="420" cy="440" r="20" fill="#52009e"/> <!-- nucleolus -->
  </g>

  <g id="mitochondria">
    <g transform="translate(550, 350) rotate(20)">
      <ellipse cx="0" cy="0" rx="25" ry="12" fill="#ffb347" stroke="#c25e00" stroke-width="2"/>
    </g>
    <g transform="translate(300, 480) rotate(-40)">
      <ellipse cx="0" cy="0" rx="25" ry="12" fill="#ffb347" stroke="#c25e00" stroke-width="2"/>
    </g>
  </g>

</svg>
