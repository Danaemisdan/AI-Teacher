<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Piano</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            font-family: sans-serif;
            color: #fff;
        }
        .piano-container {
            display: flex;
            position: relative;
            background: #222;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .key {
            position: relative;
            cursor: pointer;
            border-radius: 0 0 4px 4px;
            transition: background-color 0.1s;
        }
        .key.white {
            width: 40px;
            height: 150px;
            background: white;
            border: 1px solid #ccc;
            margin: 0 2px;
            z-index: 1;
        }
        .key.black {
            width: 28px;
            height: 90px;
            background: #333;
            margin: 0 -15px;
            z-index: 2;
        }
        .key:active, .key.active {
            background: #a855f7 !important; /* purple */
        }
        .key-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
        }
        .key.black .key-label {
            color: #aaa;
            bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="piano-container" id="piano">
        <!-- Generated by JS -->
    </div>

    <script>
        const notes = [
            { id: 'C4', type: 'white', label: 'C' },
            { id: 'Db4', type: 'black', label: 'Db' },
            { id: 'D4', type: 'white', label: 'D' },
            { id: 'Eb4', type: 'black', label: 'Eb' },
            { id: 'E4', type: 'white', label: 'E' },
            { id: 'F4', type: 'white', label: 'F' },
            { id: 'Gb4', type: 'black', label: 'Gb' },
            { id: 'G4', type: 'white', label: 'G' },
            { id: 'Ab4', type: 'black', label: 'Ab' },
            { id: 'A4', type: 'white', label: 'A' },
            { id: 'Bb4', type: 'black', label: 'Bb' },
            { id: 'B4', type: 'white', label: 'B' },
            { id: 'C5', type: 'white', label: 'C' },
        ];

        const piano = document.getElementById('piano');
        const keyElements = {};

        // Build keys
        notes.forEach(note => {
            const key = document.createElement('div');
            key.className = `key ${note.type}`;
            key.id = `key-${note.id}`;
            key.innerHTML = `<span class="key-label">${note.label}</span>`;
            
            // Interaction
            key.addEventListener('mousedown', () => pressKey(note.id, true)); // true = user initiated
            key.addEventListener('mouseup', () => releaseKey(note.id));
            key.addEventListener('mouseleave', () => releaseKey(note.id));

            piano.appendChild(key);
            keyElements[note.id] = key;
        });

        function pressKey(noteId, isUser) {
            const key = keyElements[noteId];
            if (!key) return;
            key.classList.add('active');
            
            if (isUser) {
                // Send event up to the AI Teacher!
                window.parent.postMessage({
                    type: 'USER_ACTION',
                    action: 'pressed_piano_key',
                    data: { note: noteId }
                }, '*');
            }
        }

        function releaseKey(noteId) {
            const key = keyElements[noteId];
            if (!key) return;
            key.classList.remove('active');
        }

        // Listen for AGENT_ACTION from the AI Teacher
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'AGENT_ACTION') {
                const action = event.data.action;
                if (action.action === 'highlight_key' || action.action === 'play_key') {
                    const noteId = action.key || action.note;
                    pressKey(noteId, false); // false = agent initiated, don't echo back
                    setTimeout(() => releaseKey(noteId), 500);
                }
            }
        });
    </script>
</body>
</html>
